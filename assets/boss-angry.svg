<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Pixel Art - GANGSTER BOSS: ANGRY STATE -->
  <!-- Quên build, commit message tệ -->
  <rect width="128" height="128" fill="#2e1a1a" rx="4"/>

  <!-- Head -->
  <rect x="36" y="20" width="56" height="48" fill="#d4a574"/>
  <rect x="32" y="24" width="4" height="40" fill="#d4a574"/>
  <rect x="92" y="24" width="4" height="40" fill="#d4a574"/>

  <!-- Red tint on face (angry flush) -->
  <rect x="36" y="20" width="56" height="48" fill="#cc4444" opacity="0.15"/>

  <!-- Slicked back hair (messy now) -->
  <rect x="32" y="12" width="64" height="12" fill="#111"/>
  <rect x="28" y="16" width="8" height="24" fill="#111"/>
  <rect x="92" y="16" width="8" height="24" fill="#111"/>
  <rect x="96" y="20" width="4" height="16" fill="#111"/>
  <rect x="24" y="20" width="4" height="16" fill="#111"/>
  <!-- Hair strand loose -->
  <rect x="52" y="12" width="2" height="8" fill="#222" transform="rotate(15 53 16)"/>

  <!-- Scar (more visible when angry) -->
  <rect x="40" y="48" width="2" height="12" fill="#a0604a"/>
  <rect x="42" y="46" width="2" height="4" fill="#a0604a"/>
  <rect x="38" y="56" width="2" height="4" fill="#a0604a"/>

  <!-- Sunglasses OFF - eyes visible and furious -->
  <!-- Angry eyes -->
  <rect x="38" y="38" width="16" height="10" fill="white"/>
  <rect x="74" y="38" width="16" height="10" fill="white"/>
  <rect x="44" y="40" width="8" height="6" fill="#1a1a1a"/>
  <rect x="78" y="40" width="8" height="6" fill="#1a1a1a"/>
  <!-- Red in eyes -->
  <rect x="38" y="38" width="4" height="2" fill="#cc3333"/>
  <rect x="50" y="38" width="4" height="2" fill="#cc3333"/>
  <rect x="74" y="38" width="4" height="2" fill="#cc3333"/>
  <rect x="86" y="38" width="4" height="2" fill="#cc3333"/>
  <!-- Pupil glare -->
  <rect x="46" y="40" width="2" height="2" fill="#cc0000"/>
  <rect x="80" y="40" width="2" height="2" fill="#cc0000"/>

  <!-- VERY angry eyebrows (V shape) -->
  <rect x="36" y="32" width="20" height="4" fill="#111" transform="rotate(-12 46 34)"/>
  <rect x="72" y="32" width="20" height="4" fill="#111" transform="rotate(12 82 34)"/>

  <!-- Stubble -->
  <rect x="40" y="52" width="4" height="2" fill="#8b6948" opacity="0.4"/>
  <rect x="48" y="54" width="4" height="2" fill="#8b6948" opacity="0.4"/>
  <rect x="76" y="54" width="4" height="2" fill="#8b6948" opacity="0.4"/>

  <!-- Mouth (shouting, showing teeth) -->
  <rect x="44" y="56" width="40" height="12" fill="#1a1a1a"/>
  <rect x="48" y="56" width="4" height="4" fill="#ddd"/>
  <rect x="56" y="56" width="4" height="4" fill="#ddd"/>
  <rect x="64" y="56" width="6" height="4" fill="#ffd700"/>
  <rect x="74" y="56" width="4" height="4" fill="#ddd"/>
  <!-- Tongue/inside mouth -->
  <rect x="52" y="62" width="24" height="4" fill="#8b0000"/>

  <!-- Anger vein -->
  <path d="M80 14 L84 18 L80 22 L84 18 L88 14" stroke="#e74c3c" stroke-width="2.5" fill="none"/>
  <path d="M32 18 L36 22 L32 26 L36 22 L40 18" stroke="#e74c3c" stroke-width="2" fill="none"/>

  <!-- Neck -->
  <rect x="48" y="68" width="32" height="8" fill="#d4a574"/>

  <!-- Tattoo -->
  <rect x="84" y="68" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>
  <rect x="86" y="70" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>
  <rect x="82" y="70" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>

  <!-- Gold chain (swinging from movement) -->
  <rect x="38" y="72" width="4" height="4" fill="#ffd700"/>
  <rect x="42" y="74" width="4" height="4" fill="#ffd700"/>
  <rect x="46" y="76" width="4" height="4" fill="#ffd700"/>
  <rect x="50" y="78" width="4" height="4" fill="#ffd700"/>
  <rect x="54" y="82" width="4" height="4" fill="#ffd700"/>
  <rect x="58" y="84" width="8" height="8" fill="#ffd700"/>
  <rect x="60" y="85" width="4" height="6" fill="#b8860b"/>
  <rect x="74" y="78" width="4" height="4" fill="#ffd700"/>
  <rect x="78" y="76" width="4" height="4" fill="#ffd700"/>
  <rect x="82" y="74" width="4" height="4" fill="#ffd700"/>
  <rect x="86" y="72" width="4" height="4" fill="#ffd700"/>

  <!-- Body - leather jacket -->
  <rect x="24" y="76" width="80" height="40" fill="#1a1a1a"/>
  <polygon points="48,76 64,92 56,76" fill="#222"/>
  <polygon points="80,76 64,92 72,76" fill="#222"/>
  <rect x="52" y="76" width="24" height="16" fill="#8b0000"/>

  <!-- Arms (fists raised) -->
  <rect x="12" y="72" width="12" height="28" fill="#1a1a1a"/>
  <rect x="104" y="72" width="12" height="28" fill="#1a1a1a"/>
  <!-- Fists -->
  <rect x="10" y="68" width="12" height="10" fill="#d4a574" rx="2"/>
  <rect x="106" y="68" width="12" height="10" fill="#d4a574" rx="2"/>

  <!-- Sunglasses thrown (on the side) -->
  <rect x="4" y="100" width="16" height="6" fill="#111" transform="rotate(-20 12 103)"/>

  <!-- !!! -->
  <text x="64" y="10" text-anchor="middle" font-family="monospace" font-size="10" font-weight="bold" fill="#e74c3c">! ! !</text>

  <!-- Label -->
  <text x="64" y="124" text-anchor="middle" font-family="monospace" font-size="7" fill="#e74c3c" font-weight="bold">3: ANGRY</text>
</svg>