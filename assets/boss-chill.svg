<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Pixel Art - GANGSTER BOSS: CHILL STATE -->
  <!-- Dev đang code ngoan, sếp relax -->
  <rect width="128" height="128" fill="#1a2e1a" rx="4"/>

  <!-- Head -->
  <rect x="36" y="20" width="56" height="48" fill="#d4a574"/>
  <rect x="32" y="24" width="4" height="40" fill="#d4a574"/>
  <rect x="92" y="24" width="4" height="40" fill="#d4a574"/>

  <!-- Slicked back hair -->
  <rect x="32" y="12" width="64" height="12" fill="#111"/>
  <rect x="28" y="16" width="8" height="24" fill="#111"/>
  <rect x="92" y="16" width="8" height="24" fill="#111"/>
  <rect x="96" y="20" width="4" height="16" fill="#111"/>
  <rect x="24" y="20" width="4" height="16" fill="#111"/>

  <!-- Scar on left cheek -->
  <rect x="40" y="48" width="2" height="12" fill="#b5714a"/>
  <rect x="42" y="46" width="2" height="4" fill="#b5714a"/>
  <rect x="38" y="56" width="2" height="4" fill="#b5714a"/>

  <!-- Sunglasses (relaxed, slightly tilted) -->
  <rect x="36" y="36" width="24" height="10" fill="#111" rx="1"/>
  <rect x="68" y="36" width="24" height="10" fill="#111" rx="1"/>
  <rect x="60" y="38" width="8" height="4" fill="#111"/>
  <!-- Relaxed glare -->
  <rect x="38" y="38" width="8" height="3" fill="#334433" opacity="0.5"/>
  <rect x="70" y="38" width="8" height="3" fill="#334433" opacity="0.5"/>

  <!-- Relaxed eyebrows (flat, not angry) -->
  <rect x="38" y="32" width="18" height="3" fill="#111"/>
  <rect x="72" y="32" width="18" height="3" fill="#111"/>

  <!-- Stubble -->
  <rect x="40" y="52" width="4" height="2" fill="#8b6948" opacity="0.4"/>
  <rect x="48" y="54" width="4" height="2" fill="#8b6948" opacity="0.4"/>
  <rect x="76" y="54" width="4" height="2" fill="#8b6948" opacity="0.4"/>
  <rect x="84" y="52" width="4" height="2" fill="#8b6948" opacity="0.4"/>

  <!-- Mouth (smirk, satisfied) -->
  <rect x="52" y="58" width="28" height="4" fill="#1a1a1a"/>
  <rect x="56" y="58" width="4" height="2" fill="#ddd"/>
  <rect x="64" y="58" width="6" height="2" fill="#ffd700"/>
  <rect x="74" y="58" width="4" height="2" fill="#ddd"/>
  <!-- Smirk curve up on right -->
  <rect x="80" y="56" width="4" height="4" fill="#1a1a1a"/>

  <!-- Cigar (chilling) -->
  <rect x="84" y="58" width="18" height="4" fill="#8b5e3c"/>
  <rect x="100" y="56" width="4" height="4" fill="#e67e22"/>
  <!-- Lazy smoke rings -->
  <circle cx="104" cy="50" r="3" stroke="#999" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="106" cy="42" r="4" stroke="#999" stroke-width="1" fill="none" opacity="0.2"/>

  <!-- Neck -->
  <rect x="48" y="68" width="32" height="8" fill="#d4a574"/>

  <!-- Tattoo -->
  <rect x="84" y="68" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>
  <rect x="86" y="70" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>
  <rect x="82" y="70" width="2" height="2" fill="#2d5a1e" opacity="0.7"/>

  <!-- Gold chain -->
  <rect x="40" y="72" width="4" height="4" fill="#ffd700"/>
  <rect x="44" y="74" width="4" height="4" fill="#ffd700"/>
  <rect x="48" y="76" width="4" height="4" fill="#ffd700"/>
  <rect x="52" y="78" width="4" height="4" fill="#ffd700"/>
  <rect x="56" y="80" width="4" height="4" fill="#ffd700"/>
  <rect x="60" y="82" width="8" height="8" fill="#ffd700"/>
  <rect x="62" y="83" width="4" height="6" fill="#b8860b"/>
  <rect x="72" y="78" width="4" height="4" fill="#ffd700"/>
  <rect x="76" y="76" width="4" height="4" fill="#ffd700"/>
  <rect x="80" y="74" width="4" height="4" fill="#ffd700"/>
  <rect x="84" y="72" width="4" height="4" fill="#ffd700"/>

  <!-- Body - leather jacket -->
  <rect x="24" y="76" width="80" height="40" fill="#1a1a1a"/>
  <polygon points="48,76 64,92 56,76" fill="#222"/>
  <polygon points="80,76 64,92 72,76" fill="#222"/>
  <rect x="52" y="76" width="24" height="16" fill="#8b0000"/>

  <!-- Arms (relaxed, one hand in pocket vibe) -->
  <rect x="16" y="80" width="12" height="28" fill="#1a1a1a"/>
  <rect x="100" y="80" width="12" height="28" fill="#1a1a1a"/>

  <!-- Thumbs up pixel (right hand) -->
  <rect x="100" y="104" width="8" height="8" fill="#d4a574"/>
  <rect x="104" y="96" width="4" height="8" fill="#d4a574"/>

  <!-- Zzz (relaxed) -->
  <text x="18" y="28" font-family="monospace" font-size="8" fill="#4ade80" opacity="0.5">z</text>
  <text x="12" y="20" font-family="monospace" font-size="10" fill="#4ade80" opacity="0.4">z</text>
  <text x="6" y="10" font-family="monospace" font-size="12" fill="#4ade80" opacity="0.3">z</text>

  <!-- Label -->
  <text x="64" y="124" text-anchor="middle" font-family="monospace" font-size="7" fill="#4ade80" font-weight="bold">1: CHILL</text>
</svg>