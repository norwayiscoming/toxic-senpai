<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Toxic Senpai marketplace icon -->
  <rect width="128" height="128" rx="16" fill="#1a1a2e"/>

  <!-- Head -->
  <ellipse cx="64" cy="52" rx="30" ry="28" fill="#d4a574"/>

  <!-- Hair -->
  <path d="M34 46 Q36 22 64 18 Q92 22 94 46 L90 40 Q88 26 64 22 Q40 26 38 40 Z" fill="#111"/>
  <rect x="32" y="38" width="5" height="16" rx="2" fill="#111"/>
  <rect x="91" y="38" width="5" height="16" rx="2" fill="#111"/>

  <!-- Sunglasses -->
  <rect x="38" y="42" width="20" height="10" rx="2" fill="#111"/>
  <rect x="70" y="42" width="20" height="10" rx="2" fill="#111"/>
  <rect x="58" y="44" width="12" height="4" fill="#111"/>
  <!-- Glare -->
  <rect x="40" y="44" width="6" height="3" rx="1" fill="#333" opacity="0.5"/>
  <rect x="72" y="44" width="6" height="3" rx="1" fill="#333" opacity="0.5"/>

  <!-- Eyebrows -->
  <rect x="38" y="38" width="18" height="3" rx="1" fill="#111"/>
  <rect x="72" y="38" width="18" height="3" rx="1" fill="#111"/>

  <!-- Smirk with gold tooth -->
  <path d="M48 62 Q56 66 64 64 Q72 62 80 64" stroke="#1a1a1a" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <rect x="66" y="62" width="4" height="3" rx="1" fill="#ffd700"/>

  <!-- Gold chain -->
  <path d="M40 76 Q52 86 64 88 Q76 86 88 76" stroke="#ffd700" stroke-width="3" fill="none"/>
  <circle cx="64" cy="90" r="5" fill="#ffd700"/>
  <text x="64" y="93" text-anchor="middle" font-family="monospace" font-size="7" font-weight="bold" fill="#b8860b">$</text>

  <!-- Suit -->
  <path d="M34 76 Q34 70 48 68 L64 72 L80 68 Q94 70 94 76 L94 110 L34 110 Z" fill="#1a1a1a"/>
  <rect x="52" y="68" width="24" height="14" fill="#8b0000"/>

  <!-- Title text -->
  <text x="64" y="122" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold" fill="#ffd700">TOXIC SENPAI</text>
</svg>
